<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutorial PPT - FoodMedia</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        food: {
                            primary: '#EF0000',
                            secondary: '#FF3333',
                            dark: '#990000',
                            bg: '#FEF2F2',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .btn {
            @apply inline-flex items-center justify-center px-4 py-2 border border-transparent text-sm font-medium rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-offset-2;
        }
        .btn-primary {
            @apply text-white bg-food-primary hover:bg-food-dark focus:ring-food-primary;
        }
        .btn-secondary {
            @apply text-gray-700 bg-gray-200 hover:bg-gray-300 focus:ring-gray-400;
        }
    </style>
</head>
<body class="bg-food-bg antialiased">

    <!-- Header -->
    <header class="bg-white shadow-sm sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center py-4 border-b border-gray-200">
                <div class="flex items-center gap-4">
                    <a href="index.html" class="text-2xl font-bold text-gray-900">FoodMedia</a>
                    <span class="text-gray-400">|</span>
                    <h1 class="text-xl font-semibold text-gray-700">Tutorial PPT</h1>
                </div>
                <a href="index.html" class="btn btn-secondary">
                    <i class="fas fa-arrow-left mr-2"></i>Kembali
                </a>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto py-8 sm:py-12 px-4 sm:px-6 lg:px-8">
        <div class="text-center mb-10">
            <h2 class="text-3xl font-bold text-gray-900 tracking-tight">Materi Presentasi (PPT)</h2>
            <p class="mt-2 max-w-2xl mx-auto text-lg text-gray-600">
                Unduh atau lihat materi presentasi untuk mempelajari lebih lanjut tentang layanan kami.
            </p>
        </div>

        <div id="ppt-list" class="space-y-6">
            <!-- Daftar PPT akan dimuat di sini oleh JavaScript -->
            <div class="text-center py-10">
                <i class="fas fa-spinner fa-spin text-3xl text-food-primary"></i>
                <p class="mt-2 text-gray-500">Memuat data...</p>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const pptListContainer = document.getElementById('ppt-list');
            const ppts = JSON.parse(localStorage.getItem('tutorialPpts') || '[]');

            pptListContainer.innerHTML = ''; // Hapus pesan loading

            if (ppts.length === 0) {
                pptListContainer.innerHTML = `
                    <div class="text-center bg-white p-8 rounded-lg shadow-md">
                        <i class="fas fa-folder-open text-4xl text-gray-400 mb-4"></i>
                        <h3 class="text-xl font-semibold text-gray-800">Belum Ada Materi</h3>
                        <p class="text-gray-500 mt-1">Saat ini belum ada materi presentasi yang tersedia.</p>
                    </div>
                `;
                return;
            }

            ppts.forEach(ppt => {
                const pptItem = `
                    <div class="bg-white rounded-lg shadow-md overflow-hidden transition hover:shadow-xl">
                        <div class="p-6 flex items-center justify-between gap-4">
                            <div class="flex items-center gap-5">
                                <i class="fas fa-file-powerpoint text-4xl text-red-500"></i>
                                <h3 class="text-lg font-semibold text-gray-800">${ppt.title}</h3>
                            </div>
                            <div class="flex-shrink-0 flex gap-3">
                                <a href="${ppt.viewUrl}" target="_blank" class="btn btn-secondary"><i class="fas fa-eye mr-2"></i>Lihat</a>
                                <a href="${ppt.downloadUrl}" download class="btn btn-primary"><i class="fas fa-download mr-2"></i>Unduh</a>
                            </div>
                        </div>
                    </div>
                `;
                pptListContainer.innerHTML += pptItem;
            });
        });
    </script>

</body>
</html>
